server:
    port: 8080
    servlet:
        context-path: /api
spring:
    application:
        name: gateway
    r2dbc:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        pool:
            enabled: true
            max-size: ${DB_MAX_POOL}
            initial-size: ${DB_MIN_POOL}
logging:
    level:
      io:
          r2dbc:
              postgresql:
                  query:true
                  param:true

springdoc:
    swagger-ui:
        path: /
